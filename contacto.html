Contáctanos

<div class="col-md-8">

<form onsubmit="return validarFormulario()">

<label class="form-label">Nombre</label>
<input
type="text"
id="nombre"
class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Correo Electrónico</label>

type="email"
id="correo"
class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Teléfono</label>
<input
type="text"
id="telefono"
class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Mensaje</label>
<textarea
id="mensaje"
class="form-control"
rows="5"></textarea>
</div>

<button
type="submit"
class="btn btn-success w-100">

Enviar Mensaje

</button>
