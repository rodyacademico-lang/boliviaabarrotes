    <!DOCTYPE html>
    <html lang="es">

    <head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Factura Digital</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/estilos.css">

    </head>

    <body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-success">

    <div class="container">

    <a class="navbar-brand" href="index.html">
    🛒 Abarrotes Bolivia
    </a>

    </div>

    </nav>

    <div class="container mt-5">

    <div class="card shadow">

    <div class="card-header bg-success text-white text-center">

    <h2>FACTURA DIGITAL</h2>

    </div>

    <div class="card-body">

    <div class="row">

    <div class="col-md-6">

    <h5>Datos de la Empresa</h5>

    <p>
    <b>Abarrotes Bolivia</b><br>
    NIT: 123456789<br>
    La Paz - Bolivia
    </p>

    </div>

    <div class="col-md-6 text-end">

    <h5>Factura N° 000001</h5>

    <p id="fechaFactura"></p>

    </div>

    </div>

    <hr>

    <h5>Datos del Cliente</h5>

    <p>
    Cliente: Consumidor Final
    </p>

    <table class="table table-bordered">

    <thead class="table-success">

    <tr>
    <th>Producto</th>
    <th>Cantidad</th>
    <th>Precio</th>
    <th>Total</th>
    </tr>

    </thead>

    <tbody id="detalleFactura">

    </tbody>

    <tfoot>
    <tr>
        <th colspan="3">TOTAL</th>
        <th id="totalFactura">Bs. 0</th>
    </tr>
    </tfoot>

    </table>

    <div class="alert alert-success text-center">

    <h4>
    ✔ Pago Confirmado
    </h4>

    Gracias por su compra.

    </div>

    <div class="text-center">

    <button
    class="btn btn-primary"
    onclick="window.print()">

    🖨 Imprimir Factura

    </button>
    <button
    class="btn btn-danger"
    onclick="descargarPDF()">

    📄 Descargar PDF

    </button>

    <a
    href="index.html"
    class="btn btn-success">

    🏠 Volver al Inicio

    </a>

    </div>

    </div>

    </div>

    </div>
     
       
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            let fecha = new Date();
            document.getElementById("fechaFactura").innerHTML = "<b>Fecha:</b> " + fecha.toLocaleDateString();

           
            let productos = JSON.parse(localStorage.getItem("carrito")) || [];
            let detalle = document.getElementById("detalleFactura");
            let totalFactura = 0;

           
            detalle.innerHTML = "";

           
            if (productos.length === 0) {
                detalle.innerHTML = `<tr><td colspan="4" class="text-center text-muted">No hay productos registrados</td></tr>`;
                document.getElementById("totalFactura").innerHTML = "Bs. 0.00";
                return;
            }

            productos.forEach(producto => {
            
                let precioNum = parseFloat(producto.precio) || 0; 
                totalFactura += precioNum;

                detalle.innerHTML += `
                <tr>
                    <td>${producto.nombre}</td>
                    <td class="text-center">1</td>
                    <td>Bs. ${precioNum.toFixed(2)}</td>
                    <td>Bs. ${precioNum.toFixed(2)}</td>
                </tr>
                `;
            });

            
            document.getElementById("totalFactura").innerHTML = "Bs. " + totalFactura.toFixed(2);
        });

        
        function descargarPDF() {
            
            const elementoFactura = document.querySelector(".card.shadow");
            
            const opciones = {
                margin:       10,
                filename:     'Factura_SuperMarket.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            
            html2pdf().set(opciones).from(elementoFactura).save();
        }
    </script>

    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</body>



    
    
    

    </html>
